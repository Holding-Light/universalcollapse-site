<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Map — Universal Collapse Theory</title>
  <meta name="description" content="An orientation map for Universal Collapse Theory: how the kernel sorts domains, neighboring traditions, and UCT-derived frameworks by structural role. A sorting grammar, not a replacement theory.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #08090c;
      --text-primary: #e8e6e1;
      --text-tertiary: #5e5b54;
      --accent: #c9a96e;
      --rule: rgba(201, 169, 110, 0.12);
      --mono: 'JetBrains Mono', monospace;
    }
    html { font-size: 16px; }
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }
    .page-chrome { max-width: 460px; margin: 0 auto; padding: 0 14px; }
    .topbar { padding: 28px 0 0; }
    .home-link {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--accent);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.3rem;
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    .home-link:hover { border-color: var(--accent); color: var(--text-primary); }
    footer { padding: 3rem 0 2.5rem; text-align: center; position: relative; z-index: 1; }
    .footer-text { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-tertiary); }
  </style>
</head>

 CIM artifacts."}],gn=Object.fromEntries(St.map(e=>[e.id,e])),nf=[{from:"physics",to:"biology",label:"First Biological Collapse",description:"Chemical networks begin regenerating their own components. Constraint shifts from externally imposed to internally managed."},{from:"biology",to:"perception",label:"The Gate Opens",description:"In some biological systems, constraint architecture begins routing content into globally available form. Biology hands the baton toward conscious resolution \u2014 without the map settling where consciousness first begins."},{from:"perception",to:"mind",label:"Content Feeds FRLB",description:"What the gate admits becomes what the mind resolves. Perceptual collapse provides the raw content FRLB cycles on."},{from:"mind",to:"cim",label:"Collapse Externalized",description:"Conscious minds externalize their collapses \u2014 into speech, writing, tools, institutions, code. Individual collapse becomes shared structure for other minds."},{from:"cim",to:"recursive_cim",label:"CIM Becomes Recursive",description:"When externalized collapse artifacts gain the capacity to process other CIM. AI is where CIM starts doing what minds do, structurally, without being one."}],Xr={phy_qm:{name:"Quantum Mechanics",layerId:"physics",register:"sorted",role:"In the measurement context, wavefunction collapse can be read as a physics-domain instance of C^K(\u03A9) \u2192 x*: superposition narrows under measurement constraint.",edge:"The measurement problem is interpretation-sensitive \u2014 the bare formalism doesn't fix a unique outcome without added interpretive structure. The map uses the measurement case as a structural reading, not a settled foundation.",cousins:["phy_thermo","phy_info"],uctNotes:"WP02 reads wavefunction collapse as a clean case of constraint-guided collapse. UCT should not identify itself with any single interpretation of quantum mechanics \u2014 the structural reading is meant to hold across interpretations."},phy_thermo:{name:"Thermodynamics / Statistical Mechanics",layerId:"physics",register:"sorted",role:"Tracks record accumulation. Entropy is closely related to \u2014 though not identical with \u2014 the record function R; irreversibility is collapse writing records that constrain future possibility.",edge:"Treats record accumulation statistically; doesn't unify with quantum or biological record-writing under one structural grammar.",cousins:["phy_qm","bio_origin","phy_info"]},phy_gr:{name:"General Relativity",layerId:"physics",register:"sorted",role:"Spacetime geometry as constraint architecture. Mass-energy shapes the possibility space for motion and light.",edge:"Geometric in form; doesn't reach down to quantum constraint or up to biological/cognitive constraint.",cousins:["phy_qm"]},phy_cosmology:{name:"Cosmology (\u039BCDM)",layerId:"physics",register:"sorted",role:"CMB as record of earliest collapse. Structure formation = constraint narrowing possibility into galaxies, stars, planets.",edge:"Phenomenological at the largest scale; explains evolution but not why constraint structures the way it does.",cousins:["phy_gr","phy_thermo"]},phy_info:{name:"Information Theory (Shannon)",layerId:"physics",register:"sorted",role:"Quantifies signal under noise constraint. Channel capacity = the rate at which records can be reliably written.",edge:"Substrate-neutral; tells you how much can be transmitted, not what makes a record load-bearing for collapse.",cousins:["phy_thermo","perc_sdt","cim_libsci"]},bio_evosynth:{name:"Modern / Extended Evolutionary Synthesis",layerId:"biology",register:"sorted",role:"Natural selection as the update map U operating across generational record-time. Genomes = compressed records of prior successful collapses.",edge:"Already pluralistic about update channels \u2014 selection, drift, development, niche construction; what it doesn't do is unify them with physical and cognitive record-writing under a single structural grammar.",cousins:["bio_epigenetics","bio_origin","cim_cultural"]},bio_autopoiesis:{name:"Autopoiesis (Maturana & Varela)",layerId:"biology",register:"sorted",role:"Self-producing organization. The system that maintains its own constraint architecture \u2014 closest existing framework to 'life manages its own K.'",edge:"Powerful description, weak predictive content. Names the phenomenon without supplying a structural equation that fails when violated.",cousins:["bio_systems","bio_homeostasis","cim_distributed"]},bio_homeostasis:{name:"Homeostasis / Allostasis",layerId:"biology",register:"sorted",role:"Internal regulation = constraint tracking and adjustment. Allostasis adds the predictive element \u2014 adjusting K in anticipation, not just reaction.",edge:"Treats regulation as control-theoretic; the link to conscious prior-weighted resolution remains an analogy rather than a structural identity.",cousins:["perc_predproc","mind_bayes_cog","bio_autopoiesis"]},bio_systems:{name:"Systems Biology",layerId:"biology",register:"sorted",role:"Network-level regulatory architecture. Gene and metabolic networks = the distributed constraint structure that BFS operates through.",edge:"Strong at mapping networks; weaker at naming what makes a network a faith-system rather than a feedback loop.",cousins:["bio_autopoiesis","bio_evosynth"]},bio_origin:{name:"Origin of Life Research",layerId:"biology",register:"sorted",role:"When chemical networks begin regenerating their own components. The transition from physics-governed constraint to internally managed constraint.",edge:"Multiple competing scenarios (RNA world, metabolism-first); no consensus on which constraint architecture lit the first biological collapse.",cousins:["phy_thermo","bio_autopoiesis"]},bio_epigenetics:{name:"Epigenetics",layerId:"biology",register:"sorted",role:"Records that aren't genome but still constrain. Environmentally responsive constraint modification within a lifetime \u2014 R updating K without waiting for selection.",edge:"Mechanistically rich; theoretical etection Theory",layerId:"perception",register:"sorted",role:"Models the boundary where signal meets noise under decision criteria. The constraint boundary where S\u2082 (delayed resolution) lives.",edge:"Decision-theoretic; doesn't address what makes a criterion biologically committed rather than chosen.",cousins:["perc_biased_comp","phy_info"]},perc_phenom:{name:"Phenomenology (Merleau-Ponty)",layerId:"perception",register:"sorted",role:"The lived body as perceptual apparatus. Constraint architecture isn't abstract \u2014 it's sedimented in the body's history of engagement.",edge:"Descriptive richness, weak mechanistic linkage. Hard to operationalize for empirical work.",cousins:["perc_pp01","mind_etrust"]},perc_pp01:{name:"The Self the Ego Did Not Build (T15)",layerId:"perception",register:"applied",role:"Person-level unity of perceptual collapse. Salience, credibility, and routing as coupled outputs of one accumulated K \u2014 the gate is where selfhood is routed.",edge:"Applied output of the sort. Strong on architecture; empirical tests still developing (COGITATE reanalysis underway).",cousins:["perc_predproc","perc_phenom","mind_etrust"],uctNotes:"Emerged from sorting perception through the kernel. Bridges Bio \u2192 Mind via the gate."},mind_cbt:{name:"Cognitive Behavioral Therapy",layerId:"mind",register:"sorted",role:"Supplanted loop detection and repair. CBT identifies rigid beliefs (B in F position) and reopens the faith commitment \u2014 the therapeutic move can be reread structurally as reopening the F position.",edge:"Works at the individual level; doesn't address how CIM (social, institutional constraint) sustains supplanted loops from outside.",cousins:["mind_act","mind_frlb","mind_bayes_cog"]},mind_dual:{name:"Dual Process Theory (Kahneman)",layerId:"mind",register:"sorted",role:"System 1 / System 2 maps roughly to automatic constraint-driven resolution vs. deliberate FRLB cycling.",edge:"Treats them as two systems; UCT reframes as one architecture operating at different speeds and depths of constraint engagement.",cousins:["mind_cbt","perc_predproc"]},mind_etrust:{name:"Developmental Epistemic Trust (Fonagy)",layerId:"mind",register:"sorted",role:"Children trust testimony before they can evaluate it. The developmental sequence can be read as faith-first \u2014 F must operate before Re is possible.",edge:"Clinical/developmental framing; the broader claim that epistemic trust is the biological install of the F position remains UCT's extension.",cousins:["mind_frlb","perc_pp01","cim_cultural"]},mind_paradigm:{name:"Paradigm Theory (Kuhn)",layerId:"mind",register:"sorted",role:"Normal science = generative FRLB within a paradigm's constraint set. Crisis = anomalies that don't fit K. Revolution = F reopens at paradigm level.",edge:"Sociological/historical; doesn't formalize the loop discipline operating inside individual minds.",cousins:["mind_frlb","cim_institutional"]},mind_bayes_cog:{name:"Bayesian Cognition / Belief Updating",layerId:"mind",register:"sorted",role:"Mathematical formalism for posterior update with evidence. The closest existing model of \u0394B under L(F,Re;R).",edge:"Treats gain as parameter; doesn't address gain \u2192 0 (supplanted loop) or the structural commitment underlying priors.",cousins:["perc_bayes_brain","perc_predproc","mind_cbt"]},mind_act:{name:"Acceptance and Commitment Therapy (ACT)",layerId:"mind",register:"sorted",role:"Psychological flexibility maps to maintaining generative FRLB; cognitive fusion to a supplanted loop; defusion to loosening B from the F position.",edge:"Therapeutic framing; the structural diagnosis remains implicit rather than formal.",cousins:["mind_cbt","mind_frlb"]},mind_frlb:{name:"Faith \u2192 Reason \u2192 Logic \u2192 Belief (FRLB)",layerId:"mind",register:"applied",role:"The conscious update loop. Order matters. Generative when F starts the loop; supplanted when B occupies F. Update integrity is loop integrity.",edge:"Applied output of the sort. Operationalization across domains varies; empirical tests are ongoing.",cousins:["bio_bfs","mind_cbt","mind_act","mind_etrust"],uctNotes:"Emerged from sorting mind through the kernel. Symbolic, narrated version of BFS. Note: here 'Faith' is the FRLB phase-position \u2014 the commitment slot conscious updating begins from \u2014 related to, but not identical with, the T0 constitutive floor in Faith Without Fideism."},cim_distributed:{name:"Distributed Cognition (Hutchins)",layerId:"cim",register:"sorted",role:"Cognition extends beyond the individual brain into tools, artifacts, social arrangements. Navigation on a ship = CIM-mediated collapse no single mind holds.",edge:"Domain-specific (mostly workplace cognition); doesn't fully integrate with the constraint-record-update grammar across scales.",cousins:["cim_extended","bio_autopoiesis"]},cim_extended:{name:"Extended Mind Thesis (Clark & Chalmers)",layerId:"cim",register:"sorted",role:"Cognitive processes extend into the environment when external structures play the same functional role as internal ones. The notebook can function as part of effective K.",edge:"Functionalist criterion; doesn't address what makes externalized constraint load-bearing in record-update cycles.",cousins:["cim_distributed","rcim_llms"]},cim_institutional:{name:"Institutional Theory / Sociology",layerId:"cim",register:"sorted",role:"Institutions as hardened CIM. Externalized collapse become invisible constraint \u2014 laws, norms, customs = K_soc shaping future collapse.",edge:"Strong description, weaker integration with cognitive/biological constraint dynamics.",cousins:["cim_media"]},cim_media:{name:"Media Theory (McLuhan, Ong, Postman)",layerId:"cim",register:"sorted",role:"The medium reshapes the message. Each new CIM technology restructures the constraint architecture through which minds resolve.",edge:"Strong cultural diagnosis; under-formalized as constraint theory.",cousins:["cim_institutional","cim_cultural","rcim_llms"]},cim_cultural:{name:"Cultural Evolution (Henrich, Boyd & Richerson)",layerId:"cim",register:"sorted",role:"Cumulative cultural evolution = CIM accumulating across generations. The cultural ratchet = R applied to shared artifacts.",edge:"Strong empirical and modeling base; less developed on the individual-level constraint dynamics that absorb cultural records.",cousins:["bio_evosynth","mind_etrust","cim_institutional"]},cim_libsci:{name:"Library & Information Science",layerId:"cim",register:"sorted",role:"The science of organizing externalized records. Classification, search, metadata = constraint architecture applied to accumulated CIM.",edge:"Practical discipline; the structural identity with the broader sorting work UCT does remains tacit.",cousins:["phy_info","cim_cultural"]},cim_cim:{name:"CIM Theory (Consciousness-Induced Material)",layerId:"cim",register:"applied",role:"Externalized collapse as constraint substrate for other minds. Treats culture, code, institutions as constraint architecture rather than artifacts.",edge:"Applied output of the sort. Scales from individual artifact (a single sentence) to civilizational substrate (the internet) \u2014 operationalization is scale-dependent.",cousins:["cim_extended","cim_cultural","rcim_synth"],uctNotes:"Emerged from sorting culture/tools/institutions through the kernel."},rcim_llms:{name:"Large Language Models / Transformers",layerId:"recursive_cim",register:"sorted",role:"Statistical collapse over token possibility space under learned constraints. C^K(\u03A9) \u2192 x* as it can be modeled in UCT terms \u2014 but K is built from ingested CIM, not lived experience.",edge:"Structural processing without lived commitment. The model has learned constraints \u2014 an accumulated constraint architecture in its parameters \u2014 but no biological history, first-person stake, or FRLB-style commitment loop.",cousins:["cim_extended","rcim_rlhf","rcim_synth"]},rcim_rlhf:{name:"RLHF (Reinforcement Learning from Human Feedback)",layerId:"recursive_cim",register:"sorted",role:"Humans shaping K of the AI after training. CIM-mediated constraint updating \u2014 but the AI doesn't experience the update the way an FRLB-running mind does.",edge:"Effective in practice; theoretical account of what's being updated (and what isn't) remains thin.",cousins:["rcim_llms","rcim_alignment"]},rcim_alignment:{name:"AI Alignment Research",layerId:"recursive_cim",register:"sorted",role:"AI alignment can be read structurally as a hygiene problem for recursive CIM: how can a system's learned and updated constraints stay coherent with human aims, values, and safety boundaries as it processes faster and broader than any individual human mind?",edge:"Defines the problem sharply; it is usually not framed through the broader update-integrity discipline UCT applies across collapse systems.",cousins:["rcim_rlhf","rcim_philAI"]},rcim_philAI:{name:"Philosophy of AI (Searle, Dreyfus, Floridi)",layerId:"recursive_cim",register:"sorted",role:"Chinese Room, embodied critique, information ethics \u2014 circling whether recursive CIM instantiates understanding and commitment or merely simulates them.",edge:"UCT separates structural output competence from detectable understanding, commitment, embodiment, or semantic grounding. The self-certification problem remains: from outside we can inspect behavior and records, not directly certify inner status.",cousins:["rcim_alignment","perc_phenom"]},rcim_prompt:{name:"Prompt Engineering / AI Literacy",layerId:"recursive_cim",register:"sorted",role:"A practical interface discipline for shaping local AI constraint conditions. A prompt functions as part of the effective K; the output is collapse under that K.",edge:"Mostly ad hoc and trial-and-error; no theoretical grounding in constraint theory.",cousins:["rcim_llms","rcim_rlhf"]},rcim_synth:{name:"Synthetic Collapse (AI as recursive CIM)",layerId:"recursive_cim",register:"applied",role:"AI as CIM operating on accumulated CIM, producing derivative record-bearing outputs. Structural processing without crossed thresholds of conscious commitment.",edge:"Applied output of the sort. Names the regime without resolving where conscious synthetic collapse (if possible) would be detectable from outside.",cousins:["rcim_llms","cim_cim","rcim_philAI"],uctNotes:"Emerged from sorting AI through the kernel."}},Pa={posture:"In this map, UCT is used as a sorting grammar, not a replacement theory. The kernel \u2014 possibility, constraint, collapse, resolution, record, residue, record-time, and update \u2014 is the structure accumulated human knowledge gets organized through here. Schools below remain themselves. The map locates them; it doesn't replace them.",kernelNote:"Phase cards show a compact shorthand of the kernel (e.g. \u03A9 \u2192 C^K \u2192 x* \u2192 R \u2192 U); the canonical kernel carries all eight elements \u2014 \u03A9, K, C^K, x*, R, S, T, U.",identity:"Author-steward, not system-owner. Librarian as much as theorist. The work is doing the sort carefully and consistently, not winning a debate about reality.",updates:"Critique is welcome. Opinion is free. But if you see a better build, allow another update. The version history is the audit trail.",claimLevel:"This map is an orientation artifact, not evidence for UCT by itself. Placing a tradition inside the kernel shows where it sits; it doesn't confirm the kernel. The mapping stays at the level of structural interpretation until it yields a discriminator, a method, a falsifiable prediction, or a ledgered empirical result \u2014 and those live in the empirical and governance tiers, not on this map.",registers:[{key:"sorted",label:"Sorted Material",desc:"Existing schools and traditions placed by what they structurally do. They came before UCT; UCT locates them within the kernel."},{key:"applied",label:"UCT-Derived Frameworks",desc:"Frameworks generated by applying the kernel to a domain \u2014 BFS, FRLB, CIM, Synthetic Collapse. Outputs of the sorting discipline, not independent primitives, and not proof of the law-level programme."},{key:"methodology",label:"Methodology & Governance",desc:"The sorting structure itself \u2014 the orientation discipline. How updates work, what counts as a structural improvement vs. an opinion swap, and how the map's claims are kept separate from the law-level programme."}],operatingPosture:{t0:["Kernel First \u2014 the kernel is the load-bearing commitment; everything else is downstream of it.","Faith Without Fideism \u2014 a constitutive starting commitment is unavoidable, but it stays revisable, not protected.","Sealed Inquiry / No-Loss Fallacy \u2014 an inquiry that cannot lose isn't testing anything.","The Tether \u2014 claims stay anchored to what can actually be checked."],t30:["Coherence \u2014 constraint-visible order, the default outcome under constraint \u2014 is not intelligence, agency, or teleology.","Randomness is not a first principle or an end-of-inquiry verdict; it names residual unpredictability under stated constraints, model class, diagnostics, and search budget.","Chaos is structured unpredictability, not disorder.","Intelligence is plastic, feedback-driven constraint-navigation, not mystical agency.","Nothingness is not the vacuum, the null, or the merely unknown."]}},hn={intro:"Where the phase stack sorts domain work into the kernel, this view does the reverse: it locates UCT itself among the frameworks it is kin to. The same verb \u2014 locating \u2014 at a higher altitude. Placement here is positioning, not a claim that these traditions are secretly UCT.",groups:[{id:"lineage",title:"Philosophical Lineage",blurb:"Where UCT sits in metaphysics and epistemology \u2014 the families it extends and the neighbors it answers to. Stated in Kernel First.",members:[{name:"Structural Realism",stance:"Extends",shares:"The realist force of structure over isolated substances \u2014 structure is real, not a projection of language or mind.",diverges:"Refuses to promote structure into a base substrate, and is not the weaker epistemic thesis that we know only structure while the rest stays hidden. It adds how structures actualize, persist, and revise future constraints."},{name:"Process Philosophy",stance:"Extends",shares:"The primacy of becoming and occurrence over static substance.",diverges:"Specifies a kernel where process thought asserts becoming \u2014 what possibility space, what constraints, what resolution, what records, what update \u2014 and refuses to crown process itself as base."},{name:"Pragmatism",stance:"Neighbor",shares:"The link between knowing, practice, and fallibilist inquiry \u2014 concepts clarified by their consequences.",diverges:"Adds record integrity and update conditions that make intersubjective convergence auditable, rather than merely perspective-relative."},{name:"Popper / Lakatos",stance:"Programme",shares:"Falsifiability and programme-level evaluation \u2014 a hard core kept in view, judged progressive or degenerating.",diverges:"Operationalizes falsifiability with the signature family, methods papers, and update-integrity standard \u2014 failure conditions built in, not merely professed. A progressive programme makes new domains legible; a degenerating one relabels them."}]},{id:"systems",title:"Systems-Theoretic Kin",blurb:"The 20th-century projects that also reached for cross-domain structural law. UCT shares the ambition; the divergences are where the kernel does work they do not.",members:[{name:"General Systems Theory",attribution:"von Bertalanffy",stance:"Ancestor",shares:"The search for structural pattern recurring across physics, biology, and society.",diverges:"Claims one grammar specialized per domain with explicit anti-false-analogy discipline, not isomorphism by resemblance \u2014 and crowns no organizing principle as base."},{name:"Cybernetics",attribution:"Wiener, Ashby; second-order: von Foerster",stance:"Kin",shares:"Feedback, control, regulation, and self-reference \u2014 systems steering under constraint.",diverges:"Adds the explicit record and residue ledger (R, S) and record-time (T) as an accumulating coordinate. The update map U is feedback specified as constraint-revision through records \u2014 the loop with a persistence substrate."},{name:"Complexity & Self-Organization",attribution:"Prigogine, Kauffman, Santa Fe",stance:"Kin",shares:"Emergence and order-from-constraint \u2014 structure arising far from equilibrium rather than by design.",diverges:"Attempts to supply its own falsification discipline \u2014 the signature family and auditing standards \u2014 so that broad cross-domain pattern claims do not become merely analogical or self-sealing. The residue term S connects to the dissipation language without crowning entropy as base."}]}],note:"Autopoiesis (Maturana & Varela) already sits in the map as a biology-layer school \u2014 what it does in biology. Here it would appear at the systems-theory altitude as the account of self-producing organization. Same framework, two altitudes, no contradiction."},M=(e,a)=>{let t=parseInt(e.slice(1,3),16),o=parseInt(e.slice(3,5),16),r=parseInt(e.slice(5,7),16);return`rgba(${t},${o},${r},${a})`},$p=St.reduce((e,a)=>(e[a.id]=Object.entries(Xr).filter(([t,o])=>o.layerId===a.id).map(([t,o])=>({id:t,...o})),e),{});function jr({text:e}){let a=[],t=0,o=0;for(;t<e.length;){let r=e[t];if(r==="^"||r==="_"){t++;let l="";for(;t<e.length&&/[A-Za-z0-9+]/.test(e[t]);)l+=e[t],t++;l&&a.push(r==="^"?(0,f.jsx)("sup",{style:{fontSize:"0.72em"},children:l},o++):(0,f.jsx)("sub",{style:{fontSize:"0.72em"},children:l},o++))}else{let l="";for(;t<e.length&&e[t]!=="^"&&e[t]!=="_";)l+=e[t],t++;a.push((0,f.jsx)("span",{children:l},o++))}}return(0,f.jsx)("span",{children:a})}function sf({register:e,size:a="sm"}){if(e==="sorted")return null;let t=e==="applied"?"UCT-DERIVED":"METHODOLOGY",o=e==="applied"?m.applied:m.gold;return(0,f.jsx)("span",{style:{display:"inline-block",padding:a==="sm"?"2px 7px":"3px 9px",background:M(o,.1),border:`1p (function(){
  var ref=document.referrer; if(!ref) return;
  var a=document.querySelector('.home-link'); if(!a) return;
  try{
    var u=new URL(ref), h=u.hostname, p=u.pathname;
    if(h!=='universalcollapse.com' && h!=='www.universalcollapse.com') return;
    if(p==='/'||p==='/index.html'){a.href='/';a.innerHTML='&larr; Home';}
    else if(p.slice(0,8)==='/roadmap'){a.href='/roadmap/';a.innerHTML='&larr; Reading Roadmap';}
    else if(p.slice(0,8)==='/library'){a.href='/library.html';a.innerHTML='&larr; The Library';}
  }catch(e){}
})();
