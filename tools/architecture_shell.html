<!DOCTYPE html>
<!-- tools/architecture_shell.html — HTML shell for the Architecture Map.
     Carries the two shell-level fixes: canonical tag + generated no-JS static block.
     Rebuild via tools/build_architecture.sh. NEVER hand-edit public/architecture.html. -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Architecture Map — Universal Collapse Theory</title>
  <meta name="description" content="An orientation map for Universal Collapse Theory: how the kernel sorts domains, neighboring traditions, and UCT-derived frameworks by structural role. A sorting grammar, not a replacement theory.">
  <link rel="canonical" href="https://universalcollapse.com/architecture">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #08090c;
      --text-primary: #e8e6e1;
      --text-tertiary: #5e5b54;
      --accent: #c9a96e;
      --rule: rgba(201, 169, 110, 0.12);
      --mono: 'JetBrains Mono', monospace;
    }
    html { font-size: 16px; }
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 300;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
    }
    .page-chrome { max-width: 460px; margin: 0 auto; padding: 0 14px; }
    .topbar { padding: 28px 0 0; }
    .home-link {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--accent);
      border-bottom: 1px solid var(--rule);
      padding-bottom: 0.3rem;
      transition: border-color 0.3s ease, color 0.3s ease;
    }
    .home-link:hover { border-color: var(--accent); color: var(--text-primary); }
    footer { padding: 3rem 0 2.5rem; text-align: center; position: relative; z-index: 1; }
    .footer-text { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.15em; color: var(--text-tertiary); }
  </style>
  <style id="static-map-style">
    /* No-JS / crawler summary. Replaced by the interactive map when the inline
       bundle mounts (React root.render clears #root). Generated content — see
       tools/gen_static_block.mjs; do not hand-edit. */
    .static-map { max-width: 820px; margin: 0 auto; padding: 40px 18px 64px;
      font-family: 'Outfit', system-ui, sans-serif; font-weight: 300;
      color: var(--text-primary); line-height: 1.65; }
    .static-map h1, .static-map h2, .static-map h3 {
      font-family: 'EB Garamond', Georgia, serif; font-weight: 500; line-height: 1.25; }
    .static-map h1 { font-size: 2rem; margin-bottom: 6px; }
    .static-map h2 { font-size: 1.35rem; color: var(--accent); margin: 34px 0 10px;
      padding-top: 18px; border-top: 1px solid var(--rule); }
    .static-map h3 { font-size: 1.08rem; margin: 22px 0 4px; }
    .static-map p { margin: 0 0 12px; font-size: 0.95rem; }
    .static-map .sm-sub { color: var(--text-tertiary); font-size: 0.85rem; margin-bottom: 22px; }
    .static-map .sm-kernel { font-family: var(--mono); font-size: 0.82rem; color: var(--accent); }
    .static-map .sm-papers, .static-map .sm-schools, .static-map .sm-id { color: var(--text-tertiary); font-size: 0.85rem; }
    .static-map .sm-handoff { border-left: 2px solid var(--rule); padding-left: 12px; font-size: 0.9rem; }
    .static-map sup, .static-map sub { font-size: 0.72em; }
  </style>
</head>
<body>
  <div class="page-chrome">
    <div class="topbar"><a class="home-link" href="/">&larr; universalcollapse.com</a></div>
  </div>
  <div id="root">
<!--STATIC_BLOCK-->
  </div>
  <footer>
    <p class="footer-text">© 2025–2026 HoldingLight LLC — All rights reserved</p>
  </footer>
  <!--BUNDLE_SCRIPT-->
<script>/*backlink-nav*/
(function(){
  var ref=document.referrer; if(!ref) return;
  var a=document.querySelector('.home-link'); if(!a) return;
  try{
    var u=new URL(ref), h=u.hostname, p=u.pathname;
    if(h!=='universalcollapse.com' && h!=='www.universalcollapse.com') return;
    if(p==='/'||p==='/index.html'){a.href='/';a.innerHTML='&larr; Home';}
    else if(p.slice(0,8)==='/roadmap'){a.href='/roadmap/';a.innerHTML='&larr; Reading Roadmap';}
    else if(p.slice(0,8)==='/library'){a.href='/library.html';a.innerHTML='&larr; The Library';}
  }catch(e){}
})();
</script>
</body>
</html>
