# Papers. `built` = landing page live. `read` = full-text HTML live.
# lastmod preserves existing sitemap values where present (no false-update churn).
# `tier` = grouping (llms.txt section, JSON-LD series). `tier_label` = display
# form (read-page badge) — OPTIONAL, defaults to `tier`. The two are different
# facts (2026-07-17 adjudication): a badge may say "Gateway" while the grouping
# says "Orientation". env TIER must equal tier_label-or-tier; build_site_meta
# gates it. tier_label's leading "Tier N" token must match tier's.
# `relations` (OPTIONAL, per paper) — the paper's local neighborhood in the
# program. Closed schema, all fields optional: purpose (one sentence,
# operator-adjudicated), read_first / supports / tested_by / related (lists of
# BUILT slugs — the dangling-edge gate enforces liveness), do_not_read_as
# (list of strings, operator-adjudicated). Rendered on the landing by
# patch_position_blocks.py; read_first feeds JSON-LD isBasedOn; the whole
# graph emits to /library.json. Positioning lines are claims: propose to the
# operator, never invent.
#   supports is NOT the inverse of read_first. supports = "Y is built on this";
#   read_first = "the reader should read this before Y". They coincide often
#   (kernel_first supports wp01 / wp01 reads kernel_first first) but not always:
#   records, soe and uis all support falsification_standards, which consolidates
#   them as sources while instructing the reader to start at the Program Map.
#   Non-reciprocal edges are legal and expected — do not "fix" them, and do not
#   gate on reciprocity.
