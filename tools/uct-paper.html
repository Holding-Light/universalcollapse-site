  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-deep: #08090c;
      --bg-surface: #0e1017;
      --bg-elevated: #161820;
      --text-primary: #e8e6e1;
      --text-secondary: #9b978f;
      --text-tertiary: #5e5b54;
      --accent: #c9a96e;
      --accent-dim: #8a7245;
      --rule: rgba(201, 169, 110, 0.12);
      --serif: 'EB Garamond', Georgia, serif;
      --sans: 'Outfit', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: var(--sans);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    #progress {
      position: fixed; top: 0; left: 0; height: 2px; width: 0%;
      background: var(--accent); z-index: 100; transition: width 0.1s linear;
    }

    .topbar {
      position: sticky; top: 0; z-index: 50;
      background: rgba(8, 9, 12, 0.92);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--rule);
      padding: 0.75rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.8rem;
    }
    .topbar a { color: var(--text-secondary); text-decoration: none; }
    .topbar a:hover { color: var(--accent); }
    .topbar .cite { color: var(--text-tertiary); font-family: var(--mono); font-size: 0.7rem; }

    .shell {
      max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 6rem;
      display: grid; grid-template-columns: minmax(0, 220px) minmax(0, 1fr); gap: 3rem;
    }

    nav.toc {
      position: sticky; top: 5rem; align-self: start;
      max-height: calc(100vh - 8rem); overflow-y: auto;
      font-size: 0.8rem; line-height: 1.6;
    }
    nav.toc > p {
      color: var(--text-tertiary); text-transform: uppercase;
      letter-spacing: 0.12em; font-size: 0.65rem; margin-bottom: 0.75rem;
    }
    nav.toc ul { list-style: none; }
    nav.toc ul ul { padding-left: 0.85rem; }
    nav.toc li { margin: 0.3rem 0; }
    nav.toc a {
      color: var(--text-secondary); text-decoration: none;
      display: block; padding-left: 0.6rem;
      border-left: 1px solid transparent;
    }
    nav.toc a:hover { color: var(--text-primary); }
    nav.toc a.active { color: var(--accent); border-left-color: var(--accent); }

    article { min-width: 0; }

    .paper-head { border-bottom: 1px solid var(--rule); padding-bottom: 1.75rem; margin-bottom: 2.5rem; }
    .paper-head .tier {
      font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.15em;
      color: var(--accent-dim); text-transform: uppercase;
    }
    .paper-head h1 {
      font-family: var(--serif); font-weight: 500; font-size: 2.1rem;
      line-height: 1.2; margin: 0.75rem 0 0.5rem; color: var(--text-primary);
    }
    .paper-head .sub { font-family: var(--serif); font-style: italic; color: var(--text-secondary); font-size: 1.05rem; }
    .paper-head .meta { margin-top: 1.1rem; font-size: 0.78rem; color: var(--text-tertiary); }
    .paper-head .meta a { color: var(--accent-dim); text-decoration: none; }

    article h1, article h2, article h3 {
      font-family: var(--serif); font-weight: 600; line-height: 1.3;
      color: var(--text-primary); scroll-margin-top: 5rem;
    }
    article h1 { font-size: 1.5rem; margin: 3rem 0 1rem; }
    article h2 { font-size: 1.2rem; margin: 2rem 0 0.75rem; color: var(--text-secondary); }
    article h3 { font-size: 1.05rem; margin: 1.5rem 0 0.5rem; color: var(--text-secondary); }

    article h1 .anchor, article h2 .anchor {
      opacity: 0; margin-left: 0.5rem; color: var(--accent-dim);
      text-decoration: none; font-size: 0.7em; font-family: var(--sans);
    }
    article h1:hover .anchor, article h2:hover .anchor { opacity: 1; }

    article p {
      font-family: var(--serif); font-size: 1.12rem; font-weight: 400;
      line-height: 1.75; margin: 0 0 1.15rem; color: var(--text-primary);
    }
    article ul, article ol { font-family: var(--serif); font-size: 1.12rem; margin: 0 0 1.15rem 1.5rem; }
    article li { margin-bottom: 0.4rem; }
    article strong { font-weight: 600; color: var(--text-primary); }
    article em { font-style: italic; }
    article a { color: var(--accent); text-decoration: none; border-bottom: 1px solid var(--rule); }
    article blockquote {
      border-left: 2px solid var(--accent-dim); padding-left: 1.25rem;
      margin: 1.5rem 0; color: var(--text-secondary); font-style: italic;
      border-radius: 0;
    }

    math { font-size: 1.05em; color: var(--text-primary); }

    .backtotop {
      display: inline-block; margin-top: 3rem; padding-top: 1.5rem;
      border-top: 1px solid var(--rule); width: 100%;
      font-size: 0.8rem; color: var(--text-tertiary); text-decoration: none;
    }
    .backtotop:hover { color: var(--accent); }

    #toc-toggle { display: none; }

    @media (max-width: 820px) {
      .shell { grid-template-columns: minmax(0, 1fr); gap: 1.5rem; padding: 1.25rem 1.1rem 4rem; }
      nav.toc {
        position: static; max-height: none; order: -1;
        border: 1px solid var(--rule); border-radius: 6px; padding: 0.9rem 1rem;
      }
      nav.toc[data-collapsed="true"] ul { display: none; }
      #toc-toggle { display: block; background: none; border: none; color: var(--text-secondary);
        font-family: var(--sans); font-size: 0.75rem; cursor: pointer; padding: 0; }
      .paper-head h1 { font-size: 1.6rem; }
      article p, article ul, article ol { font-size: 1.08rem; }
    }

<body>

<div id="progress"></div>

<div class="topbar">
  <a href="$landing_url$">&larr; $short_title$</a>

</div>

<div class="shell">

  <nav class="toc" id="toc" data-collapsed="false">
    <p>Contents</p>
    <button id="toc-toggle" aria-expanded="true">Hide contents</button>
    $toc$
  </nav>

  <article>
    <header class="paper-head">
      <span class="tier">$tier$</span>
      <h1>$title$</h1>
      $if(subtitle)$<p class="sub">$subtitle$</p>$endif$
      <p class="meta">
        Jeremy C. Jones &middot; HoldingLight LLC &middot; $citation_date$ &middot; CC BY 4.0<br>
        Cite as <a href="https://doi.org/$citation_doi$">$citation_doi$</a>
        $if(citation_pdf_url)$&middot; <a href="$citation_pdf_url$">PDF</a>$endif$
      </p>
    </header>

    $body$

    <a href="#top" class="backtotop">&uarr; Back to top</a>
  </article>

</div>

<script>
(function () {
  var bar = document.getElementById('progress');
  function onScroll() {
    var h = document.documentElement;
    var pct = h.scrollTop / (h.scrollHeight - h.clientHeight);
    bar.style.width = (pct * 100).toFixed(1) + '%';
  }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  var links = Array.prototype.slice.call(document.querySelectorAll('nav.toc a'));
  var targets = links.map(function (a) {
    return document.getElementById(decodeURIComponent(a.getAttribute('href')).slice(1));
  });
  var obs = new IntersectionObserver(function (entries) {
    entries.forEach(function (e) {
      if (!e.isIntersecting) return;
      var i = targets.indexOf(e.target);
      if (i < 0) return;
      links.forEach(function (l) { l.classList.remove('active'); });
      links[i].classList.add('active');
    });
  }, { rootMargin: '-10% 0px -80% 0px' });
  targets.forEach(function (t) { if (t) obs.observe(t); });

  var btn = document.getElementById('toc-toggle');
  var nav = document.getElementById('toc');
  btn.addEventListener('click', function () {
    var c = nav.getAttribute('data-collapsed') === 'true';
    nav.setAttribute('data-collapsed', String(!c));
    btn.setAttribute('aria-expanded', String(c));
    btn.textContent = c ? 'Hide contents' : 'Show contents';
  });

  document.querySelectorAll('article section[id] > h1, article section[id] > h2').forEach(function (h) {
    var a = document.createElement('a');
    a.className = 'anchor';
    a.href = '#' + h.parentNode.id;
    a.textContent = '#';
    a.setAttribute('aria-label', 'Link to this section');
    h.appendChild(a);
  });
})();
</script>
